<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Home Finder - Internal Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary-container": "#ffede6",
                        "secondary-fixed": "#d3e4fe",
                        "on-error": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed": "#360f00",
                        "error": "#ba1a1a",
                        "surface-variant": "#e0e3e5",
                        "secondary": "#505f76",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface-dim": "#d8dadc",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "on-secondary-fixed-variant": "#38485d",
                        "primary-fixed-dim": "#b4c5ff",
                        "background": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "outline": "#737686",
                        "on-primary-fixed": "#00174b",
                        "on-background": "#191c1e",
                        "primary": "#004ac6",
                        "tertiary-container": "#bc4800",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c3c6d7",
                        "surface-container-high": "#e6e8ea",
                        "tertiary-fixed": "#ffdbcd",
                        "on-secondary-container": "#54647a",
                        "surface-bright": "#f7f9fb",
                        "secondary-container": "#d0e1fb",
                        "on-primary-container": "#eeefff",
                        "inverse-surface": "#2d3133",
                        "tertiary": "#943700",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "inverse-on-surface": "#eff1f3",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "8px",
                        "gutter": "20px",
                        "xl": "40px",
                        "lg": "24px",
                        "container-max": "1280px",
                        "md": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Inter"],
                        "code-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", { "lineHeight": "26px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],

                },
            },
        }

    <style>
        body {
            background-color: #f7f9fb;
            color: #191c1e;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <!-- Top Branding Header -->
    <header class="w-full flex justify-center items-center h-20 bg-surface">
        <div class="flex items-center gap-sm">
            <span class="material-symbols-outlined text-primary text-[32px]"
                style="font-variation-settings: 'FILL' 1;">home</span>
            <h1 class="font-headline-md text-headline-md text-primary tracking-tight font-extrabold">Home Finder</h1>
        </div>
    </header>
    <main class="flex-grow flex flex-col px-md py-xl max-w-md mx-auto w-full">
        <!-- Hero Section -->
        <section class="mb-xl relative overflow-hidden rounded-xl h-64 border border-outline-variant">
            <img alt="A cozy, modern, and bright living room interior with a warm atmosphere."
                class="w-full h-full object-cover"
                data-alt="A warm and inviting modern living room with a cozy beige sofa, soft ambient lighting, and elegant wooden accents. The space is clean and well-organized, featuring a few indoor plants and large windows that let in soft natural light, creating a comfortable and high-end residential atmosphere."
                src="./modern_and_bright_living_room_interior_with_a_warm_atmosphere.png" />
            <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
        </section>
        <!-- Access Message -->
        <div class="text-center mb-xl">
            <h2 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Internal Access Only</h2>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Please sign in with your corporate Microsoft account to continue.
            </p>
        </div>
        <!-- Authentication Interaction -->
        <div class="flex flex-col gap-md">
            <!-- Primary Microsoft Sign-in Button -->
            <button
                class="flex items-center justify-center gap-md w-full h-[56px] bg-primary-container text-on-primary rounded-xl font-headline-sm text-headline-sm hover:opacity-90 active:scale-95 transition-all shadow-sm">
                <svg height="21" viewbox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg">
                    <rect fill="#f25022" height="9" width="9" x="1" y="1"></rect>
                    <rect fill="#7fba00" height="9" width="9" x="11" y="1"></rect>
                    <rect fill="#00a4ef" height="9" width="9" x="1" y="11"></rect>
                    <rect fill="#ffb900" height="9" width="9" x="11" y="11"></rect>
                </svg>
                <span>Sign in with Microsoft</span>
            </button>
            <!-- Support Info -->
            <div class="mt-lg p-md bg-surface-container rounded-lg border border-outline-variant">
                <div class="flex items-start gap-sm">
                    <span class="material-symbols-outlined text-outline text-[20px]">info</span>
                    <p class="font-body-md text-body-md text-on-surface-variant">
                        Trouble signing in? Contact the <span class="font-semibold text-primary">IT Support Desk</span>
                        for authorization or credentials help.
                    </p>
                </div>
            </div>
        </div>
        <!-- System Status Footer (Minimalist) -->
        <footer class="mt-auto pt-xl text-center">
            <div class="flex items-center justify-center gap-xs mb-xs">
                <div class="w-2 h-2 rounded-full bg-[#10b981]"></div>
                <span class="font-label-md text-label-md text-on-surface-variant tracking-widest">SYSTEM
                    OPERATIONAL</span>
            </div>
            <p class="font-code-sm text-code-sm text-outline opacity-50">v4.2.0-PROD | HOME FINDER ENTERPRISE</p>
        </footer>
    </main>
</body>

</html>
